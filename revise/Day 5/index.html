<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>


<body>
  <section id = "player1" class="panel">
    <div class="row">
      <span id="player1RedChip">0</span>
      <button class="chipButton" data-action="add" data-color="Red">Take Red</button>
      <button class="chipButton" data-action="remove" data-color="Red">Remove Red</button>
    </div>

    <div class="row">
      <span id="player1GreenChip">0</span>
      <button class="chipButton" data-action="add" data-color="Green">Take Green</button>
      <button class="chipButton" data-action="remove" data-color="Green">Remove Green</button>
    </div>

    <div class="row">
      <span id="player1BlueChip">0</span>
      <button class="chipButton" data-action="add" data-color="Blue">Take Blue</button>
      <button class="chipButton" data-action="remove" data-color="Blue">Remove Blue</button>
    </div>

    <div class="row">
      <span id="player1BlackChip">0</span>
      <button class="chipButton" data-action="add" data-color="Black">Take Black</button>
      <button class="chipButton" data-action="remove" data-color="Black">Remove Black</button>
    </div>

    <div class="row">
      <span id="player1WhiteChip">0</span>
      <button class="chipButton" data-action="add" data-color="White">Take White</button>
      <button class="chipButton" data-action="remove" data-color="White">Remove White</button>
    </div>

    <div class="row">
      <span id="player1WildChip">0</span>
      <button class="chipButton" data-action="add" data-color="Wild">Take Wild</button>
      <button class="chipButton" data-action="remove" data-color="Wild">Remove Wild</button>
    </div>
  </section>

  <div id="takePanel" class="panel">
    <div>Selected: <span id="selectedText">none</span></div>
    <button id="confirmTake">Confirm Take</button>
    <button id="clearTake">Clear</button>
    <div id="takeError"></div>
  </div>

  <section id = "banker" class="panel">
    <div class="row">
      <span id="bankRemainingRedChip">7</span>
    </div>

    <div class="row">
      <span id="bankRemainingGreenChip">7</span>
    </div>

    <div class="row">
      <span id="bankRemainingBlueChip">7</span>
    </div>

    <div class="row">
      <span id="bankRemainingBlackChip">7</span>
    </div>

    <div class="row">
      <span id="bankRemainingWhiteChip">7</span>
    </div>
    
    <div class="row">
      <span id="bankRemainingWildChip">5</span>
    </div>
  </section>

  <section id="market">
    <h2>Market</h2>
    <div id="marketCards"></div>
  </section>

<script src="index.js"></script>

</body>
</html>
