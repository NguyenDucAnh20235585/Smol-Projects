<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="gameLog">Game started. Player 1's turn.</div>
  
  <section id = "player1" class="panel">

    <div class="row">
      <span id="player1VictoryPoints">0</span>
    </div>

    <section id="ownedCardsPanel" class="panel">
      <h2>Owned Cards</h2>
      <div id="player1OwnedCards"></div>
    </section>

    <div id="turnStatus" class="panel">
    Current turn: <span id="currentPlayerLabel">Player 1</span>
    </div>

    <div class="column" id="bonusChip">
      <div>Red bonus: <span id="player1RedBonus">0</span></div>
      <div>Green bonus: <span id="player1GreenBonus">0</span></div>
      <div>Blue bonus: <span id="player1BlueBonus">0</span></div>
      <div>Black bonus: <span id="player1BlackBonus">0</span></div>
      <div>White bonus: <span id="player1WhiteBonus">0</span></div>
    </div>

    <div class="row">
      <span id="player1RedChip">0</span>
      <button class="chipButton" data-action="add" data-color="Red">Take Red</button>
    </div>

    <div class="row">
      <span id="player1GreenChip">0</span>
      <button class="chipButton" data-action="add" data-color="Green">Take Green</button>
    </div>

    <div class="row">
      <span id="player1BlueChip">0</span>
      <button class="chipButton" data-action="add" data-color="Blue">Take Blue</button>
    </div>

    <div class="row">
      <span id="player1BlackChip">0</span>
      <button class="chipButton" data-action="add" data-color="Black">Take Black</button>
    </div>

    <div class="row">
      <span id="player1WhiteChip">0</span>
      <button class="chipButton" data-action="add" data-color="White">Take White</button>
    </div>

    <div class="row">
      <span id="player1WildChip">Wild Chip: 0</span>
    </div>
  </section>

  <div id="takePanel" class="panel">
    <div>Selected: <span id="selectedText">none</span></div>
    <button id="confirmTake">Confirm Take</button>
    <button id="clearTake">Clear</button>
    <div id="takeError"></div>
  </div>

  <div id="reservePanel" class="panel">
    <button id="reserveModeButton">Reserve Card</button>
    <button id="confirmReserve">Confirm Reserve</button>
    <button id="cancelAction">Cancel</button>
    <div>Selected reserve card: <span id="selectedReserveText">none</span></div>
  </div>

    <section id="ReservedCardsPanel" class="panel">
      <h2>Reserved Cards</h2>
      <div id="player1ReservedCards"></div>
    </section>


  <section id = "banker" class="panel">
    <div class="row">
      <span id="bankRemainingRedChip">7</span>
    </div>

    <div class="row">
      <span id="bankRemainingGreenChip">7</span>
    </div>

    <div class="row">
      <span id="bankRemainingBlueChip">7</span>
    </div>

    <div class="row">
      <span id="bankRemainingBlackChip">7</span>
    </div>

    <div class="row">
      <span id="bankRemainingWhiteChip">7</span>
    </div>
    
    <div class="row">
      <span id="bankRemainingWildChip">5</span>
    </div>
  </section>

  <section id="market">
    <h2>Market</h2>
    <div id="marketArea">
      <div id="marketTier3"></div>
      <div id="marketTier2"></div>
      <div id="marketTier1"></div>
    </div>
  </section>

<script src="index.js"></script>

</body>
</html>
